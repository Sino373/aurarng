<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA RNG</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#04050f;--panel:rgba(8,10,28,0.92);--border:rgba(255,255,255,0.07);
  --text:#dde4f8;--muted:rgba(180,195,255,0.4);--coin:#fbbf24;
}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden}
.bg-stars{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(1px 1px at 12% 18%,#fff,transparent),
    radial-gradient(1px 1px at 34% 72%,#fff,transparent),radial-gradient(1px 1px at 58% 9%,#fff,transparent),
    radial-gradient(1px 1px at 78% 55%,#fff,transparent),radial-gradient(1px 1px at 91% 22%,#fff,transparent),
    radial-gradient(1px 1px at 5% 88%,#fff,transparent),radial-gradient(1px 1px at 46% 44%,#fff,transparent),
    radial-gradient(1.5px 1.5px at 67% 81%,rgba(180,200,255,.8),transparent),
    radial-gradient(1.5px 1.5px at 23% 61%,rgba(180,200,255,.7),transparent),
    radial-gradient(2px 2px at 82% 35%,rgba(160,180,255,.6),transparent);
  animation:starDrift 90s linear infinite}
.bg-stars:nth-child(2){animation-duration:55s;animation-direction:reverse;opacity:.5;transform:scale(1.4)}
@keyframes starDrift{0%{background-position:0 0}100%{background-position:500px 300px}}
.bg-nebula{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 55% 40% at 15% 50%,rgba(80,40,160,.08),transparent),
    radial-gradient(ellipse 45% 55% at 82% 25%,rgba(20,80,180,.06),transparent),
    radial-gradient(ellipse 38% 45% at 55% 85%,rgba(160,30,100,.05),transparent)}
.app{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:16px 14px 60px;
  display:flex;flex-direction:column;align-items:center;gap:18px}
header{text-align:center;padding-top:8px}
header h1{font-family:'Cinzel',serif;font-size:clamp(2rem,6vw,3.6rem);font-weight:900;
  letter-spacing:.15em;background:linear-gradient(135deg,#b8a8ff 0%,#7eb8ff 45%,#ffb8f0 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 28px rgba(140,100,255,.5))}
header p{margin-top:4px;font-size:.85rem;color:var(--muted);letter-spacing:.3em;text-transform:uppercase}
.top-bar{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:100%}
.chip{background:var(--panel);border:1px solid var(--border);border-radius:10px;
  padding:7px 16px;font-size:.82rem;font-weight:600;letter-spacing:.04em;
  display:flex;align-items:center;gap:7px}
.chip .lbl{color:var(--muted);font-weight:400}
#coinChip .val{color:var(--coin)}
.luck-active{border-color:rgba(251,191,36,.4)!important}
.luck-active .val{color:#fbbf24!important}
.equipped-section{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:20px;overflow:hidden;transition:border-color .4s,box-shadow .4s}
.equipped-header{padding:10px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.equipped-header h2{font-family:'Cinzel',serif;font-size:.78rem;letter-spacing:.3em;color:var(--muted);text-transform:uppercase}
.equipped-empty{padding:24px;text-align:center;color:var(--muted);font-size:.9rem;letter-spacing:.1em}
#effectCanvas{width:100%;height:200px;display:block}
.equipped-info{padding:10px 18px 14px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border)}
.equipped-name{font-family:'Cinzel',serif;font-size:1.2rem;font-weight:700}
.equipped-rarity{font-size:.75rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-top:2px}
.unequip-btn{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;
  padding:6px 14px;font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:600;
  color:var(--muted);cursor:pointer;transition:all .2s}
.unequip-btn:hover{background:rgba(255,255,255,.1);color:var(--text)}
.roll-wrap{width:100%;max-width:500px}
/* FIX: use CSS transition instead of JS-driven opacity flicker for cycling frames */
.roll-card{background:var(--panel);border:2px solid var(--border);border-radius:22px;
  padding:36px 24px;min-height:268px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;text-align:center;
  position:relative;overflow:hidden;
  transition:border-color .35s,box-shadow .45s}
.roll-card.cycling{transition:none} /* disable slow transition during fast cycling */
.roll-card::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 110%,var(--g,transparent),transparent 65%);
  opacity:.35;pointer-events:none;transition:background .4s}
.card-idle{color:var(--muted);font-size:1rem;letter-spacing:.2em;font-family:'Cinzel',serif}
.card-rarity{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.4em;text-transform:uppercase}
.card-emoji{font-size:4.5rem;line-height:1}
.card-name{font-family:'Cinzel',serif;font-size:clamp(1.4rem,4vw,2.2rem);font-weight:700;color:#fff}
.card-desc{font-size:.88rem;color:var(--muted);font-weight:300;max-width:260px;line-height:1.4}
.card-chance{font-size:.74rem;color:rgba(180,195,255,.28);letter-spacing:.08em;margin-top:-4px}
.equip-now-btn{margin-top:4px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);
  border-radius:20px;padding:8px 28px;font-family:'Cinzel',serif;font-size:.8rem;font-weight:700;
  letter-spacing:.15em;color:#fff;cursor:pointer;transition:background .2s,transform .15s;text-transform:uppercase}
.equip-now-btn:hover{background:rgba(255,255,255,.14);transform:translateY(-1px)}
@keyframes revealPop{0%{transform:scale(.87);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
.revealed-anim{animation:revealPop .45s cubic-bezier(.34,1.56,.64,1) forwards}
.card-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:20px}
.p-dot{position:absolute;border-radius:50%;animation:pFloat var(--d,2s) ease-out forwards;opacity:0}
@keyframes pFloat{0%{transform:translateY(10px) scale(0);opacity:1}80%{opacity:.7}100%{transform:translateY(calc(-70px - var(--x,0px))) scale(.2);opacity:0}}
.roll-btn-wrap{text-align:center}
.roll-btn{background:linear-gradient(135deg,#3d22aa,#6b30dd,#8b50ee);border:none;border-radius:50px;
  padding:16px 56px;font-family:'Cinzel',serif;font-size:1.2rem;font-weight:700;
  letter-spacing:.2em;color:#fff;cursor:pointer;transition:transform .15s,box-shadow .3s,opacity .2s;
  box-shadow:0 0 28px rgba(110,50,220,.5),0 4px 18px rgba(0,0,0,.5);
  text-transform:uppercase;position:relative;overflow:hidden}
.roll-btn::after{content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
  background-size:200%;animation:btnShimmer 3s linear infinite}
@keyframes btnShimmer{0%{background-position:-200% center}100%{background-position:200% center}}
.roll-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 0 44px rgba(110,50,220,.7),0 8px 26px rgba(0,0,0,.5)}
.roll-btn:active:not(:disabled){transform:scale(.97)}
.roll-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
.shop-section{width:100%}
.shop-toggle{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:14px;
  padding:12px 20px;display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:.3em;
  color:var(--muted);text-transform:uppercase;transition:background .2s}
.shop-toggle:hover{background:rgba(255,255,255,.06)}
.shop-arrow{transition:transform .3s}
.shop-open .shop-arrow{transform:rotate(180deg)}
.shop-body{display:none;margin-top:8px;background:var(--panel);border:1px solid var(--border);
  border-radius:16px;padding:16px}
.shop-open .shop-body{display:block}
.shop-section-label{font-size:.72rem;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;padding-left:2px}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:4px}
.shop-item{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;
  padding:14px;display:flex;flex-direction:column;gap:6px;transition:background .2s}
.shop-item:hover{background:rgba(255,255,255,.06)}
.shop-item-name{font-family:'Cinzel',serif;font-size:.82rem;font-weight:700;color:var(--text)}
.shop-item-desc{font-size:.76rem;color:var(--muted);line-height:1.35;flex:1}
.shop-item-price{font-size:.8rem;font-weight:700;color:var(--coin);display:flex;align-items:center;gap:4px}
.buy-btn{background:linear-gradient(135deg,rgba(251,191,36,.15),rgba(251,191,36,.05));
  border:1px solid rgba(251,191,36,.3);border-radius:8px;padding:6px 0;
  font-family:'Rajdhani',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:.1em;
  color:var(--coin);cursor:pointer;transition:background .2s,border-color .2s,transform .1s;text-transform:uppercase}
.buy-btn:hover:not(:disabled){background:rgba(251,191,36,.2);border-color:rgba(251,191,36,.5);transform:translateY(-1px)}
.buy-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.buy-btn.owned{color:#4ade80;border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.08);cursor:default}
.history-section{width:100%}
.history-section h2{font-family:'Cinzel',serif;font-size:.78rem;letter-spacing:.3em;color:var(--muted);
  text-transform:uppercase;text-align:center;margin-bottom:10px}
.history-grid{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;
  max-height:170px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(110,50,220,.3) transparent}
.h-chip{background:rgba(255,255,255,.04);border:1px solid var(--bc,rgba(255,255,255,.1));
  border-radius:7px;padding:4px 10px;font-size:.78rem;font-weight:600;
  display:flex;align-items:center;gap:5px;color:var(--bc,#9ca3af);
  animation:chipIn .25s ease;cursor:pointer;transition:background .15s}
.h-chip:hover{background:rgba(255,255,255,.08)}
@keyframes chipIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.coin-toast{position:fixed;top:20px;right:20px;z-index:1000;
  background:rgba(20,18,10,.9);border:1px solid rgba(251,191,36,.4);border-radius:10px;
  padding:10px 20px;font-family:'Cinzel',serif;font-size:.9rem;font-weight:700;
  color:var(--coin);animation:toastIn .3s ease,toastOut .3s ease 1.7s forwards;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
@keyframes toastOut{to{opacity:0;transform:translateY(-10px)}}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(110,50,220,.3);border-radius:3px}
</style>
</head>
<body>
<div class="bg-stars"></div>
<div class="bg-stars"></div>

<div class="app">
  <header>
    <h1>AURA RNG</h1>

    <div class="chip" id="luckChip"><span class="lbl">Luck</span><span class="val" id="luckDisplay">×1.0</span></div>
    <div class="chip"><span class="lbl">Speed</span><span class="val" id="speedDisplay">Lv.0</span></div>
  </div>
  <div class="equipped-section" id="equippedSection">

    <canvas id="effectCanvas" style="display:none"></canvas>
    <div class="equipped-info" id="equippedInfo" style="display:none">
      <div><div class="equipped-name" id="equippedName">—</div><div class="equipped-rarity" id="equippedRarity">—</div></div>
      <button class="unequip-btn" onclick="unequip()">✕ Unequip</button>

  </div>
  <div class="roll-wrap">
    <div class="roll-card" id="rollCard">
      <div class="card-particles" id="cardParticles"></div>
      <div id="idleView"><div class="card-idle">Roll to discover your fate</div></div>
      <div id="resultView" style="display:none;flex-direction:column;align-items:center;gap:10px">

    </div>
  </div>
  <div class="roll-btn-wrap">
    <button class="roll-btn" id="rollBtn" onclick="startRoll()">⚡ ROLL</button>
  </div>
  <div class="shop-section">
    <div class="shop-toggle" onclick="toggleShop()">

      <div class="shop-grid" id="shopGrid"></div>
      <div class="shop-section-label" style="margin-top:16px">⚡ Speed Upgrades (permanent)</div>
      <div class="shop-grid" id="speedGrid"></div>
    </div>
  </div>
  <div class="history-section">

  </div>
</div>

const ITEMS=RAW.map(([name,emoji,rarity,desc,effect])=>({
  name,emoji,rarity,desc,effect,
  color:RARITIES[rarity].color,glow:RARITIES[rarity].glow,weight:RARITIES[rarity].weight
}));
const TOTAL_W=ITEMS.reduce((s,i)=>s+i.weight,0);

// Pre-build cumulative weight table for O(n) but faster constant-factor random
const CUM_W=new Float64Array(ITEMS.length);
let _acc=0;
for(let i=0;i<ITEMS.length;i++){_acc+=ITEMS[i].weight;CUM_W[i]=_acc;}

// STATE
let st={coins:0,rolls:0,luck:1,luckLeft:0,speedLevel:0,equippedItem:null,lastResult:null,history:[],rolling:false};
const SPEED_DUR=[3200,2400,1700,1100];

// WEIGHTED RANDOM — binary-search the cumulative table (fast for 110 items)
function weightedRandom(){
  if(st.luck===1){
    // Fast path: no luck modifier, pure binary search
    const r=Math.random()*TOTAL_W;
    let lo=0,hi=ITEMS.length-1;
    while(lo<hi){const mid=(lo+hi)>>1;if(CUM_W[mid]<r)lo=mid+1;else hi=mid;}
    return ITEMS[lo];
  }
  // Luck path: rebuild weighted pool (only when luck active)
  const lm=st.luck;
  let total=0;
  const ws=new Float64Array(ITEMS.length);
  for(let i=0;i<ITEMS.length;i++){
    const rank=RARITY_RANK.indexOf(ITEMS[i].rarity);
    let w=ITEMS[i].weight;
    if(rank>=4)w*=(1+(lm-1)*rank*.1);
    ws[i]=w;total+=w;
  }
  let r=Math.random()*total;
  for(let i=0;i<ITEMS.length;i++){r-=ws[i];if(r<=0)return ITEMS[i];}
  return ITEMS[0];
}

// DOM refs
const $rollCard=document.getElementById('rollCard');
const $idle=document.getElementById('idleView');
const $result=document.getElementById('resultView');
const $cRarity=document.getElementById('cRarity');

// OPTIMISED ROLL: no async/await crossfade per frame — use requestAnimationFrame scheduling
// This avoids the 90ms×N overhead (was ~1.8s wasted on fade gaps alone at 20 frames)
function startRoll(){
  if(st.rolling)return;
  st.rolling=true;
  document.getElementById('rollBtn').disabled=true;

  const result=weightedRandom();
  const dur=SPEED_DUR[st.speedLevel];

  // Build schedule
  const sched=[];
  for(let i=0;i<18;i++)sched.push(55);
  const raw=[70,88,110,140,178,225,285,360,455,575,730,930];
  const rawSum=raw.reduce((a,b)=>a+b,0)+18*55;
  const sc=Math.max(.3,dur/rawSum);
  raw.forEach(d=>sched.push(Math.round(d*sc)));

  $rollCard.classList.add('cycling');
  $idle.style.display='none';
  $result.style.display='flex';

  let idx=0;
  let lastTime=performance.now();

  function tick(now){
    if(idx>=sched.length){
      // Final reveal
      $rollCard.classList.remove('cycling');
      setCard(result,false);
      $rollCard.classList.remove('revealed-anim');
      void $rollCard.offsetWidth;
      $rollCard.classList.add('revealed-anim');
      spawnParticles(result);

      const earned=COIN_VAL[result.rarity];
      st.coins+=earned;
      showToast('+'+earned.toLocaleString()+' 💰');
      if(st.luckLeft>0){st.luckLeft--;if(st.luckLeft<=0){st.luck=1;st.luckLeft=0;}}
      st.rolls++;
      st.lastResult=result;
      addHistory(result);
      updateUI();
      st.rolling=false;
      document.getElementById('rollBtn').disabled=false;
      return;
    }
    const elapsed=now-lastTime;
    if(elapsed>=sched[idx]){
      // Pick random item and update DOM directly — no opacity fade during cycling
      setCycleFrame(ITEMS[Math.floor(Math.random()*ITEMS.length)]);
      lastTime=now;
      idx++;
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// Lightweight cycling update — only touches fields that change, no transitions
function setCycleFrame(item){
  $cRarity.textContent=item.rarity.toUpperCase();
  $cRarity.style.color=item.color;

  $rollCard.style.borderColor='rgba(255,255,255,.07)';

// Full card update for final reveal
function setCard(item,cycling){
  $idle.style.display='none';
  $result.style.display='flex';
  $cRarity.textContent=item.rarity.toUpperCase();
  $cRarity.style.color=item.color;
  $cEmoji.textContent=item.emoji;
  $cEmoji.style.filter=cycling?'':`drop-shadow(0 0 18px ${item.glow})`;
  $cName.textContent=item.name;
  $cName.style.textShadow=cycling?'none':`0 0 22px ${item.glow}`;
  $cDesc.textContent=cycling?'':item.desc;
  const pct=item.weight/TOTAL_W*100;
  $cChance.textContent=cycling?'':`Chance: ~${pct>=0.01?pct.toFixed(3):pct.toExponential(2)}%`;
  $equipBtn.style.display=cycling?'none':'';

// Particle pool — reuse nodes instead of rebuilding
const PARTICLE_POOL=[];
function getParticle(){
  if(PARTICLE_POOL.length){const p=PARTICLE_POOL.pop();p.style.animation='none';return p;}
  const p=document.createElement('div');p.className='p-dot';return p;
}

function spawnParticles(item){
  // Return existing particles to pool
  while($particles.firstChild){
    const c=$particles.firstChild;
    $particles.removeChild(c);
    PARTICLE_POOL.push(c);
  }
  const rank=RARITY_RANK.indexOf(item.rarity);
  const count=Math.min(8+rank*6,60);
  const frag=document.createDocumentFragment();
  for(let i=0;i<count;i++){
    const p=getParticle();
    const sz=4+Math.random()*8;
    p.style.cssText=`width:${sz}px;height:${sz}px;background:${item.color};
      left:${5+Math.random()*90}%;bottom:${5+Math.random()*40}%;
      --d:${1+Math.random()*2}s;--x:${Math.random()*50}px;
      animation-delay:${Math.random()*.4}s;box-shadow:0 0 ${sz*2}px ${item.glow};animation:pFloat var(--d,2s) ease-out forwards`;
    frag.appendChild(p);
  }
  $particles.appendChild(frag);
}

// EQUIP — only restart canvas effect if effect type changed
let _currentEffect=null;
function equipCurrent(){if(st.lastResult)equip(st.lastResult);}
function equip(item){
  st.equippedItem=item;
  document.getElementById('equippedEmpty').style.display='none';

  s.style.borderColor=item.color+'55';s.style.boxShadow=`0 0 24px ${item.glow}33`;
  // Only restart effect if the type changed — avoids teardown+rebuild on every equip click
  if(_currentEffect!==item.effect){
    _currentEffect=item.effect;
    startEffect(item.effect,item.color,item.glow);
  } else {
    // Just update colors in the running effect
    _effectColor=item.color;_effectGlow=item.glow;
    const cv=document.getElementById('effectCanvas');
    const rgb=h2r(item.color);
    _effectRgb=rgb;
  }
}
function unequip(){
  st.equippedItem=null;_currentEffect=null;stopEffect();
  document.getElementById('equippedEmpty').style.display='';
  document.getElementById('effectCanvas').style.display='none';
  document.getElementById('equippedInfo').style.display='none';
  const s=document.getElementById('equippedSection');
  s.style.borderColor='';s.style.boxShadow='';
}

// CANVAS EFFECTS
let _raf=null,_parts=[];

function stopEffect(){
  if(_raf){cancelAnimationFrame(_raf);_raf=null;}
  _parts=[];
  const cv=document.getElementById('effectCanvas');
  if(cv)cv.getContext('2d').clearRect(0,0,cv.width,cv.height);
}

function h2r(hex){
  const c=hex.replace('#','').slice(0,6);
  if(c.length<6)return'128,128,128';
  return`${parseInt(c.slice(0,2),16)},${parseInt(c.slice(2,4),16)},${parseInt(c.slice(4,6),16)}`;
}

      }
      if(Math.random()<.1){const r2=20+Math.random()*80,a=Math.random()*Math.PI*2;_parts.push({x:W/2+Math.cos(a)*r2,y:H/2+Math.sin(a)*r2*.5,life:1,sz:2+Math.random()*4});}
      _parts=_parts.filter(p=>{p.life-=.025;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);ctx.fillStyle=`rgba(255,240,180,${p.life})`;ctx.fill();return p.life>0;});
      const c=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,60);
      c.addColorStop(0,`rgba(${rgb},.35)`);c.addColorStop(1,'transparent');
      ctx.fillStyle=c;ctx.fillRect(0,0,W,H);
    },
    rainbow:()=>{
      ctx.clearRect(0,0,W,H);
      if(t%50===0)_parts.push({r:0,sp:1.5+Math.random(),life:1,hue:Math.random()*360});
      _parts=_parts.filter(p=>{p.r+=p.sp;p.life-=.016;ctx.beginPath();ctx.arc(W/2,H/2,p.r,0,Math.PI*2);ctx.strokeStyle=`hsla(${p.hue},100%,70%,${p.life*.5})`;ctx.lineWidth=3;ctx.stroke();return p.life>0&&p.r<Math.max(W,H);});
      const hue=(t*2)%360;
      const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*.45);
      bg.addColorStop(0,`hsla(${hue},100%,70%,.1)`);bg.addColorStop(.5,`hsla(${(hue+120)%360},100%,60%,.06)`);bg.addColorStop(1,'transparent');
      ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    },
    chaos:()=>{
      ctx.clearRect(0,0,W,H);
      if(Math.random()<.18){const y=Math.random()*H,h2=5+Math.random()*20;ctx.fillStyle=`rgba(255,0,${Math.floor(Math.random()*255)},.25)`;ctx.fillRect(0,y,W,h2);}
      for(let i=0;i<8;i++){ctx.fillStyle=`rgba(${Math.random()>.5?'255,0,255':'0,255,255'},.5)`;ctx.fillRect(Math.random()*W,Math.random()*H,2+Math.random()*6,2);}
      if(Math.random()<.08){ctx.strokeStyle=`rgba(255,0,255,${Math.random()*.4})`;ctx.lineWidth=2;ctx.strokeRect(2,2,W-4,H-4);}
    },
    soul:()=>{
      const rgb=_effectRgb;
      ctx.clearRect(0,0,W,H);
      if(Math.random()<.05)_parts.push({x:W*.3+Math.random()*W*.4,y:H+10,phase:Math.random()*Math.PI*2,sp:.8+Math.random()*1.2,life:1,sz:9+Math.random()*16});
      _parts=_parts.filter(p=>{p.y-=p.sp;p.phase+=.04;p.x+=Math.sin(p.phase)*1.5;p.life-=.007;const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.sz);g.addColorStop(0,`rgba(${rgb},${p.life*.6})`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();return p.life>0&&p.y>-30;});
    },
    singularity:()=>{
      const rgb=_effectRgb;
      ctx.clearRect(0,0,W,H);
      if(Math.random()<.15){const a=Math.random()*Math.PI*2,d=50+Math.random()*Math.max(W,H)*.5;_parts.push({x:W/2+Math.cos(a)*d,y:H/2+Math.sin(a)*d*.6,life:1,sz:2+Math.random()*4});}
      const cx=W/2,cy=H/2;
      _parts=_parts.filter(p=>{const dx=cx-p.x,dy=cy-p.y,d=Math.sqrt(dx*dx+dy*dy);if(d<8)return false;const pl=Math.min(5,80/d);p.x+=dx/d*pl;p.y+=dy/d*pl;p.life-=.009;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);ctx.fillStyle=`rgba(${rgb},${p.life*.8})`;ctx.fill();return p.life>0;});
      const pulse=.5+.5*Math.sin(t*.08);
      const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,30+pulse*20);
      cg.addColorStop(0,`rgba(255,255,255,${.8*pulse})`);cg.addColorStop(.3,`rgba(${rgb},${.5*pulse})`);cg.addColorStop(1,'transparent');
      ctx.fillStyle=cg;ctx.fillRect(0,0,W,H);
      for(let i=1;i<=3;i++){ctx.beginPath();ctx.arc(cx,cy,i*24*pulse,0,Math.PI*2);ctx.strokeStyle=`rgba(${rgb},${.3/i})`;ctx.lineWidth=1;ctx.stroke();}
    },
    time:()=>{
      const rgb=_effectRgb;
      ctx.clearRect(0,0,W,H);
      const cx=W/2,cy=H/2,cr=55;
      ctx.beginPath();ctx.arc(cx,cy,cr,0,Math.PI*2);ctx.strokeStyle=`rgba(${rgb},.2)`;ctx.lineWidth=2;ctx.stroke();
      const hr=t*.002,mn=t*.012;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(hr)*33,cy+Math.sin(hr)*33);ctx.strokeStyle=`rgba(${rgb},.6)`;ctx.lineWidth=2;ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(mn)*48,cy+Math.sin(mn)*48);ctx.strokeStyle=`rgba(${rgb},.4)`;ctx.lineWidth=1;ctx.stroke();
      if(Math.random()<.06)_parts.push({x:cx+(Math.random()-.5)*cr*2,y:cy+(Math.random()-.5)*cr*2,vx:(Math.random()-.5)*.5,vy:-1-Math.random(),life:1,sz:2+Math.random()*3});
      _parts=_parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=.016;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);ctx.fillStyle=`rgba(${rgb},${p.life*.7})`;ctx.fill();return p.life>0;});
      const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,W*.5);
      bg.addColorStop(0,`rgba(${rgb},.06)`);bg.addColorStop(1,'transparent');
      ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    },
  };

  const render=EFFECTS[type]||EFFECTS.fire;
  function loop(){render();t++;_raf=requestAnimationFrame(loop);}
  loop();
}

// SHOP
const POTIONS=[
  {id:'p1',name:'Minor Luck',emoji:'🧪',desc:'+1× luck for 15 rolls',price:100,bonus:1,rolls:15},
  {id:'p2',name:'Luck Brew',emoji:'⚗️',desc:'+2× luck for 30 rolls',price:350,bonus:2,rolls:30},
  {id:'p3',name:'Grand Elixir',emoji:'🔮',desc:'+5× luck for 50 rolls',price:1200,bonus:5,rolls:50},
];
const SPEEDS=[
  {level:1,name:'Speed I',  emoji:'⚡',desc:'Roll time: 2.4s',price:500},
  {level:2,name:'Speed II', emoji:'⚡',desc:'Roll time: 1.7s',price:1500},
  {level:3,name:'Speed III',emoji:'⚡',desc:'Roll time: 1.1s',price:4000},
];

let _shopOpen=false;
function renderShop(){
  const g=document.getElementById('shopGrid');g.innerHTML='';
  POTIONS.forEach(p=>{
    const d=document.createElement('div');d.className='shop-item';
    d.innerHTML=`<div class="shop-item-name">${p.emoji} ${p.name}</div><div class="shop-item-desc">${p.desc}</div><div class="shop-item-price"><span>💰</span>${p.price.toLocaleString()}</div><button class="buy-btn" ${st.coins>=p.price?'':'disabled'} onclick="buyPotion('${p.id}')">Buy</button>`;
    g.appendChild(d);
  });
  const sg=document.getElementById('speedGrid');sg.innerHTML='';
  SPEEDS.forEach(s=>{
    const owned=st.speedLevel>=s.level;
    const canBuy=!owned&&st.coins>=s.price&&st.speedLevel===s.level-1;
    const d=document.createElement('div');d.className='shop-item';
    d.innerHTML=`<div class="shop-item-name">${s.emoji} ${s.name}</div><div class="shop-item-desc">${s.desc}</div><div class="shop-item-price"><span>💰</span>${s.price.toLocaleString()}</div><button class="buy-btn ${owned?'owned':''}" ${canBuy?'':owned?'':'disabled'} onclick="buySpeed(${s.level})">${owned?'✓ Owned':'Buy'}</button>`;
    sg.appendChild(d);
  });
}
function buyPotion(id){
  const p=POTIONS.find(x=>x.id===id);if(!p||st.coins<p.price)return;
  st.coins-=p.price;st.luck=1+p.bonus;st.luckLeft=p.rolls;
  showToast('-'+p.price.toLocaleString()+' 💰');updateUI();
}
function buySpeed(level){
  const s=SPEEDS.find(x=>x.level===level);if(!s||st.coins<s.price||st.speedLevel!==level-1)return;
  st.coins-=s.price;st.speedLevel=level;showToast('-'+s.price.toLocaleString()+' 💰');updateUI();
}
function toggleShop(){
  _shopOpen=!_shopOpen;
  document.querySelector('.shop-section').classList.toggle('shop-open',_shopOpen);
  if(_shopOpen)renderShop();
}

// HISTORY — prepend single chip instead of rebuilding entire list
function addHistory(item){
  st.history.unshift(item);
  if(st.history.length>50)st.history.pop();
  const g=document.getElementById('historyGrid');
  // Remove oldest chip if at cap
  if(g.children.length>=50)g.removeChild(g.lastChild);
  // Prepend new chip
  const c=document.createElement('div');
  c.className='h-chip';
  c.style.setProperty('--bc',item.color+'aa');
  c.innerHTML=`<span>${item.emoji}</span><span>${item.name}</span>`;
  c.onclick=()=>{st.lastResult=item;setCard(item,false);};
  g.insertBefore(c,g.firstChild);
}

// TOAST + UI
let _toastEl=null,_toastTimer=null;
function showToast(msg){
  if(_toastEl){clearTimeout(_toastTimer);_toastEl.remove();}
  _toastEl=document.createElement('div');
  _toastEl.className='coin-toast';_toastEl.textContent=msg;
  document.body.appendChild(_toastEl);
  _toastTimer=setTimeout(()=>{_toastEl&&_toastEl.remove();_toastEl=null;},2100);
}

// updateUI no longer calls renderShop — shop re-renders only on toggle or purchase
function updateUI(){
  document.getElementById('coinDisplay').textContent=st.coins.toLocaleString();
  document.getElementById('rollsDisplay').textContent=st.rolls.toLocaleString();
  document.getElementById('luckDisplay').textContent='×'+st.luck.toFixed(1)+(st.luckLeft>0?` (${st.luckLeft} left)`:'');
  document.getElementById('speedDisplay').textContent='Lv.'+st.speedLevel;
  const lc=document.getElementById('luckChip');
  if(st.luckLeft>0)lc.classList.add('luck-active');else lc.classList.remove('luck-active');
  // Only re-render shop if it's open (e.g. after a purchase)
  if(_shopOpen)renderShop();
}

window.addEventListener('resize',()=>{
  if(st.equippedItem){
    const cv=document.getElementById('effectCanvas');
    const dpr=devicePixelRatio||1;
    cv.width=cv.offsetWidth*dpr;
    cv.height=cv.offsetHeight*dpr;
    const ctx=cv.getContext('2d');
    ctx.scale(dpr,dpr);
  }
});
updateUI();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🕹️ ARCADE ZONE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06060f;
  --surf: #0d0d22;
  --cyan: #00ffff;
  --pink: #ff00aa;
  --green: #00ff88;
  --gold: #ffd700;
  --purple: #bb44ff;
  --red: #ff3344;
  --orange: #ff8800;
}

*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'Press Start 2P', monospace;
  color: #fff;
  overflow-x: hidden;
  overscroll-behavior: none;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,.10) 0, rgba(0,0,0,.10) 1px, transparent 1px, transparent 3px);
  pointer-events: none;
  z-index: 9998;
}

#stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

/* ─── LOBBY ─── */
#lobby {
  position: relative; z-index: 1;
  padding: clamp(20px,5vw,50px) clamp(14px,4vw,28px) 60px;
  max-width: 1100px; margin: 0 auto;
}

.arcade-header { text-align: center; margin-bottom: clamp(28px,6vw,64px); }

.arcade-header h1 {
  font-size: clamp(16px,5.5vw,52px);
  color: var(--cyan);
  text-shadow: 0 0 10px var(--cyan), 0 0 30px var(--cyan), 0 0 70px rgba(0,255,255,.45);
  letter-spacing: clamp(2px,.8vw,6px);
  margin-bottom: 14px;
  animation: titlePulse 2.5s ease-in-out infinite;
}

.tagline {
  font-size: clamp(5px,1.8vw,9px);
  color: var(--gold);
  animation: blink 1.1s step-end infinite;
}

@keyframes titlePulse {
  0%,100%{ text-shadow: 0 0 10px var(--cyan),0 0 30px var(--cyan),0 0 70px rgba(0,255,255,.45); }
  50%    { text-shadow: 0 0 20px var(--cyan),0 0 60px var(--cyan),0 0 110px rgba(0,255,255,.7); }
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.game-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(clamp(130px,28vw,190px), 1fr));
  gap: clamp(10px,3vw,20px);
}

.game-card {
  background: var(--surf);
  border: 2px solid #2a2a44;
  border-radius: 8px;
  padding: clamp(16px,4vw,28px) 14px clamp(12px,3vw,20px);
  cursor: pointer; text-align: center;
  transition: transform .2s, border-color .2s, box-shadow .2s;
  position: relative; overflow: hidden;
  user-select: none;
}
.game-card::before {
  content: ''; position: absolute; inset: 0; opacity: 0;
  background: radial-gradient(ellipse at center, rgba(0,255,255,.1) 0%, transparent 70%);
  transition: opacity .3s;
}
.game-card[data-c="pink"]::before   { background: radial-gradient(ellipse at center, rgba(255,0,170,.1) 0%, transparent 70%); }
.game-card[data-c="green"]::before  { background: radial-gradient(ellipse at center, rgba(0,255,136,.1) 0%, transparent 70%); }
.game-card[data-c="gold"]::before   { background: radial-gradient(ellipse at center, rgba(255,215,0,.1) 0%, transparent 70%); }
.game-card[data-c="purple"]::before { background: radial-gradient(ellipse at center, rgba(187,68,255,.1) 0%, transparent 70%); }

.game-card:hover::before, .game-card:active::before { opacity:1; }
.game-card:hover, .game-card:active { transform: translateY(-5px); }

.game-card[data-c="cyan"]  :is(.card-title){ color:var(--cyan);  text-shadow:0 0 8px var(--cyan);  }
.game-card[data-c="pink"]  :is(.card-title){ color:var(--pink);  text-shadow:0 0 8px var(--pink);  }
.game-card[data-c="green"] :is(.card-title){ color:var(--green); text-shadow:0 0 8px var(--green); }
.game-card[data-c="gold"]  :is(.card-title){ color:var(--gold);  text-shadow:0 0 8px var(--gold);  }
.game-card[data-c="purple"]:is(.card-title){ color:var(--purple);text-shadow:0 0 8px var(--purple);}

.game-card[data-c="cyan"]  { --ac:var(--cyan); }
.game-card[data-c="pink"]  { --ac:var(--pink); }
.game-card[data-c="green"] { --ac:var(--green);}
.game-card[data-c="gold"]  { --ac:var(--gold); }
.game-card[data-c="purple"]{ --ac:var(--purple);}

.game-card:hover,.game-card:active { border-color:var(--ac); box-shadow:0 0 20px var(--ac),0 0 55px rgba(255,255,255,.07); }

.card-icon  { font-size:clamp(32px,9vw,54px); display:block; margin-bottom:12px; }
.card-title { font-size:clamp(6px,1.8vw,10px); margin-bottom:10px; letter-spacing:1px; }
.card-coin  { font-size:clamp(5px,1.3vw,7px); color:rgba(255,255,255,.3); animation:blink 1.4s step-end infinite; }

/* ─── MODAL ─── */
#modal {
  position: fixed; inset: 0;
  background: rgba(0,0,12,.97);
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  /* Safe area padding for notch phones */
  padding-top:    max(env(safe-area-inset-top, 0px),    10px);
  padding-bottom: max(env(safe-area-inset-bottom, 0px), 8px);
  padding-left:   12px;
  padding-right:  12px;
  gap: 8px;
  overflow: hidden;
}
#modal.hidden { display: none; }

/* Header */
.mbar {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; max-width: 600px;
  flex-shrink: 0;
  min-height: 36px;
}

#gameName  { font-size:clamp(8px,2.5vw,14px); color:var(--cyan); text-shadow:0 0 10px var(--cyan); }
#scoreDisp { font-size:clamp(7px,2vw,11px); color:var(--gold); text-shadow:0 0 6px var(--gold); }

#exitBtn {
  font-family: 'Press Start 2P', monospace; font-size: 8px;
  padding: 7px 12px; background: transparent;
  border: 1px solid var(--pink); color: var(--pink);
  cursor: pointer; letter-spacing: 1px; transition: all .2s; flex-shrink: 0;
}
#exitBtn:hover, #exitBtn:active { background: var(--pink); color: #000; }

/* Canvas wrapper */
#cwrap {
  border: 2px solid var(--cyan);
  box-shadow: 0 0 18px var(--cyan), 0 0 50px rgba(0,255,255,.08), inset 0 0 18px rgba(0,255,255,.03);
  line-height: 0;
  flex-shrink: 1;
  min-height: 0;
}

#gameCanvas {
  display: block;
  /* Fit within viewport leaving room for header + controls */
  max-width:  min(520px, calc(100vw - 24px));
  max-height: calc(100svh - 210px);
  width: auto; height: auto;
  image-rendering: pixelated;
  touch-action: none;
}

/* Landscape: more height available for canvas, controls go beside */
@media (orientation: landscape) and (max-height: 520px) {
  #modal { flex-direction: row; flex-wrap: wrap; align-content: center; justify-content: center; gap: 6px; }
  .mbar  { order: 0; min-height: 30px; width: 100%; }
  #cwrap { order: 1; flex-shrink: 1; align-self: center; }
  #tpad  { order: 2; flex-direction: column; align-self: center; }
  #gameCanvas {
    max-height: calc(100svh - 44px);
    max-width:  calc(100vw - 190px);
  }
}

/* ─── TOUCH PAD ─── */
#tpad {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 16px;
}

/* D-pad */
.dpad {
  display: grid;
  grid-template-columns: repeat(3, 50px);
  grid-template-rows:    repeat(3, 50px);
  gap: 4px;
}
/* Position buttons in grid */
.dpad [data-dir="u"] { grid-column:2; grid-row:1; }
.dpad [data-dir="l"] { grid-column:1; grid-row:2; }
.dpad [data-dir="r"] { grid-column:3; grid-row:2; }
.dpad [data-dir="d"] { grid-column:2; grid-row:3; }
/* Centre spacer */
.dpad-center {
  grid-column:2; grid-row:2;
  width:50px; height:50px;
  background: rgba(255,255,255,.02);
  border: 1.5px solid #222;
  border-radius: 8px;
}

/* Action buttons */
.acts { display: flex; flex-direction: column; gap: 8px; align-items: center; }

/* Generic touch button */
.tb {
  width: 50px; height: 50px;
  font-family: 'Press Start 2P', monospace; font-size: 16px;
  background: rgba(0,255,255,.07);
  border: 1.5px solid rgba(0,255,255,.4);
  color: var(--cyan);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  touch-action: none;
  user-select: none; -webkit-user-select: none;
  transition: background .08s, transform .08s;
}
.tb:active, .tb.held { background: rgba(0,255,255,.3); transform: scale(.93); }

.fire-tb {
  width: 110px; height: 50px;
  font-size: 7px; letter-spacing: 1px;
  color: var(--gold);
  border-color: rgba(255,215,0,.45);
  background: rgba(255,215,0,.06);
}
.fire-tb:active, .fire-tb.held { background: rgba(255,215,0,.28); transform: scale(.95); }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<!-- LOBBY -->
<div id="lobby">
  <div class="arcade-header">
    <h1>🕹 ARCADE ZONE</h1>
    <div class="tagline">▸ TAP A GAME TO PLAY ◂</div>
  </div>
  <div class="game-grid">
    <div class="game-card" data-c="green"  onclick="openGame('snake')">
      <span class="card-icon">🐍</span>
      <div class="card-title">SNAKE</div>
      <div class="card-coin">— INSERT COIN —</div>
    </div>
    <div class="game-card" data-c="pink"   onclick="openGame('breakout')">
      <span class="card-icon">🧱</span>
      <div class="card-title">BREAKOUT</div>
      <div class="card-coin">— INSERT COIN —</div>
    </div>
    <div class="game-card" data-c="cyan"   onclick="openGame('tetris')">
      <span class="card-icon">🟦</span>
      <div class="card-title">TETRIS</div>
      <div class="card-coin">— INSERT COIN —</div>
    </div>
    <div class="game-card" data-c="purple" onclick="openGame('invaders')">
      <span class="card-icon">👾</span>
      <div class="card-title">INVADERS</div>
      <div class="card-coin">— INSERT COIN —</div>
    </div>
    <div class="game-card" data-c="gold"   onclick="openGame('pong')">
      <span class="card-icon">🏓</span>
      <div class="card-title">PONG</div>
      <div class="card-coin">— INSERT COIN —</div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="hidden">
  <div class="mbar">
    <div id="gameName">GAME</div>
    <div id="scoreDisp">SCORE: 0</div>
    <button id="exitBtn" onclick="closeGame()">✕ EXIT</button>
  </div>

  <div id="cwrap">
    <canvas id="gameCanvas"></canvas>
  </div>

  <div id="tpad">
    <!-- D-pad -->
    <div class="dpad">
      <button class="tb" id="tU" data-dir="u">▲</button>
      <button class="tb" id="tL" data-dir="l">◀</button>
      <div class="dpad-center"></div>
      <button class="tb" id="tR" data-dir="r">▶</button>
      <button class="tb" id="tD" data-dir="d">▼</button>
    </div>
    <!-- Action -->
    <div class="acts">
      <button class="tb fire-tb" id="tFire">FIRE<br>START</button>
    </div>
  </div>
</div>

<script>
'use strict';

/* ══════ STARS ══════ */
(function(){
  const c=document.getElementById('stars'), x=c.getContext('2d');
  const rsz=()=>{c.width=innerWidth;c.height=innerHeight;};
  rsz(); addEventListener('resize',rsz);
  const st=Array.from({length:180},()=>({px:Math.random()*innerWidth,py:Math.random()*innerHeight,r:Math.random()*1.3+.2,ph:Math.random()*Math.PI*2,sp:.004+Math.random()*.006}));
  (function t(){x.clearRect(0,0,c.width,c.height);st.forEach(s=>{s.ph+=s.sp;x.fillStyle=`rgba(255,255,255,${((Math.sin(s.ph)+1)/2)*.75})`;x.beginPath();x.arc(s.px,s.py,s.r,0,Math.PI*2);x.fill();});requestAnimationFrame(t);})();
})();

/* ══════ ENGINE ══════ */
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
let cur=null,raf=null,score=0,over=false;
const keys={};
const setScore=s=>{score=s;document.getElementById('scoreDisp').textContent='SCORE: '+s;};

function openGame(name){
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('gameName').textContent=GAMES[name].title;
  cur=name;score=0;over=false;setScore(0);
  canvas.width=GAMES[name].W; canvas.height=GAMES[name].H;
  GAMES[name].init();
  startLoop();
}

function closeGame(){
  document.getElementById('modal').classList.add('hidden');
  if(raf){cancelAnimationFrame(raf);raf=null;}
  if(cur&&GAMES[cur].cleanup)GAMES[cur].cleanup();
  cur=null;
}

function startLoop(){
  if(raf)cancelAnimationFrame(raf);
  const ivl=GAMES[cur].interval||16; let last=0;
  const tick=ts=>{
    if(!cur)return;
    raf=requestAnimationFrame(tick);
    const dt=ts-last;
    if(!over&&dt>=ivl){last=ts-(dt%ivl);GAMES[cur].update();}
    GAMES[cur].draw();
  };
  raf=requestAnimationFrame(tick);
}

/* Keyboard */
document.addEventListener('keydown',e=>{
  if(!cur)return;
  keys[e.key]=true;
  GAMES[cur].onKey&&GAMES[cur].onKey(e.key);
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

/* Touch buttons — supports held keys for movement */
function bindBtn(id,key){
  const btn=document.getElementById(id); if(!btn)return;
  const dn=e=>{e.preventDefault();keys[key]=true;btn.classList.add('held');if(cur)GAMES[cur].onKey&&GAMES[cur].onKey(key);};
  const up=e=>{e.preventDefault();keys[key]=false;btn.classList.remove('held');};
  btn.addEventListener('touchstart',dn,{passive:false});
  btn.addEventListener('touchend',up,{passive:false});
  btn.addEventListener('touchcancel',up,{passive:false});
  btn.addEventListener('mousedown',dn);
  btn.addEventListener('mouseup',up);
  btn.addEventListener('mouseleave',up);
}
bindBtn('tU','ArrowUp'); bindBtn('tD','ArrowDown');
bindBtn('tL','ArrowLeft'); bindBtn('tR','ArrowRight');
bindBtn('tFire',' ');

/* Swipe on canvas — drives Snake; tap = space for others */
let sw0=null;
canvas.addEventListener('touchstart',e=>{sw0={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});
canvas.addEventListener('touchend',e=>{
  if(!sw0||!cur)return;
  const dx=e.changedTouches[0].clientX-sw0.x, dy=e.changedTouches[0].clientY-sw0.y; sw0=null;
  if(Math.abs(dx)+Math.abs(dy)<18){GAMES[cur].onKey&&GAMES[cur].onKey(' ');return;}
  const key=Math.abs(dx)>Math.abs(dy)?(dx>0?'ArrowRight':'ArrowLeft'):(dy>0?'ArrowDown':'ArrowUp');
  GAMES[cur].onKey&&GAMES[cur].onKey(key);
},{passive:true});

/* ══════ DRAW HELPERS ══════ */
const BG='#06060f',SF='#0d0d22';
const C={cyan:'#00ffff',pink:'#ff00aa',green:'#00ff88',gold:'#ffd700',purple:'#bb44ff',red:'#ff3344',orange:'#ff8800',white:'#ffffff'};
const glo=(c,b=14)=>{ctx.shadowColor=c;ctx.shadowBlur=b;};
const ngl=()=>{ctx.shadowBlur=0;};
const bx=(x,y,w,h,c)=>{ctx.fillStyle=c;ctx.fillRect(x,y,w,h);};
function tx(s,x,y,c,sz=10,al='left'){ctx.font=`${sz}px 'Press Start 2P',monospace`;ctx.fillStyle=c;ctx.textAlign=al;ctx.fillText(s,x,y);ctx.textAlign='left';}

function gameOverScreen(msg='GAME OVER'){
  bx(0,0,canvas.width,canvas.height,'rgba(0,0,0,.82)');
  tx(msg,canvas.width/2,canvas.height/2-26,C.pink,20,'center');
  tx('SCORE: '+score,canvas.width/2,canvas.height/2+14,C.gold,13,'center');
  tx('FIRE/SPACE TO RESTART',canvas.width/2,canvas.height/2+50,C.cyan,8,'center');
}

function splash(title,lines){
  bx(0,0,canvas.width,canvas.height,'rgba(0,0,0,.76)');
  tx(title,canvas.width/2,canvas.height/2-48,C.cyan,20,'center');
  lines.forEach((l,i)=>tx(l,canvas.width/2,canvas.height/2+i*22,C.white,8,'center'));
  tx('FIRE/SPACE TO START',canvas.width/2,canvas.height/2+lines.length*22+24,C.gold,8,'center');
}

/* ══════ SNAKE ══════ */
const snake={
  title:'SNAKE',W:400,H:440,interval:130,
  G:20,COLS:20,ROWS:20,body:[],dir:{x:1,y:0},nxt:{x:1,y:0},food:null,
  init(){this.body=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];this.dir={x:1,y:0};this.nxt={x:1,y:0};this.food=null;this._food();},
  _food(){let p;do{p={x:Math.floor(Math.random()*this.COLS),y:Math.floor(Math.random()*this.ROWS)};}while(this.body.some(b=>b.x===p.x&&b.y===p.y));this.food=p;},
  update(){
    this.dir=this.nxt;
    const h={x:this.body[0].x+this.dir.x,y:this.body[0].y+this.dir.y};
    if(h.x<0||h.x>=this.COLS||h.y<0||h.y>=this.ROWS||this.body.some(b=>b.x===h.x&&b.y===h.y)){over=true;return;}
    this.body.unshift(h);
    if(h.x===this.food.x&&h.y===this.food.y){setScore(score+10);this._food();}else this.body.pop();
  },
  draw(){
    const G=this.G,OY=40;
    bx(0,0,canvas.width,canvas.height,BG);
    ctx.strokeStyle='rgba(0,255,255,.04)';ctx.lineWidth=.5;
    for(let i=0;i<=this.COLS;i++){ctx.beginPath();ctx.moveTo(i*G,OY);ctx.lineTo(i*G,OY+this.ROWS*G);ctx.stroke();}
    for(let j=0;j<=this.ROWS;j++){ctx.beginPath();ctx.moveTo(0,OY+j*G);ctx.lineTo(this.COLS*G,OY+j*G);ctx.stroke();}
    bx(0,0,canvas.width,OY,SF);
    tx('SNAKE',10,27,C.green,12);tx('LEN: '+this.body.length,230,27,C.cyan,10);
    glo(C.red,18);bx(this.food.x*G+3,OY+this.food.y*G+3,G-6,G-6,C.red);ngl();
    this.body.forEach((s,i)=>{
      ctx.fillStyle=`hsl(${140-i*1.5},100%,${i===0?60:52}%)`;
      if(i===0)glo(C.green,14);else ngl();
      ctx.fillRect(s.x*G+1,OY+s.y*G+1,G-2,G-2);
    });ngl();
    const hd=this.body[0];bx(hd.x*G+4,OY+hd.y*G+4,3,3,'#000');bx(hd.x*G+G-7,OY+hd.y*G+4,3,3,'#000');
    if(over)gameOverScreen();
  },
  onKey(k){
    if(over&&(k===' '||k==='Enter')){over=false;setScore(0);this.init();return;}
    const d=this.dir;
    if(k==='ArrowUp'   &&d.y!== 1)this.nxt={x:0,y:-1};
    if(k==='ArrowDown' &&d.y!==-1)this.nxt={x:0,y:1};
    if(k==='ArrowLeft' &&d.x!== 1)this.nxt={x:-1,y:0};
    if(k==='ArrowRight'&&d.x!==-1)this.nxt={x:1,y:0};
  }
};

/* ══════ BREAKOUT ══════ */
const breakout={
  title:'BREAKOUT',W:480,H:520,interval:16,
  ball:{},paddle:{},bricks:[],started:false,_mm:null,_tm:null,
  init(){
    this.paddle={x:190,y:480,w:100,h:12};
    this.ball={x:240,y:462,vx:3.6,vy:-4.8,r:8};
    this.started=false;this.bricks=[];
    const cols=[C.pink,C.red,C.orange,C.gold,C.green,C.cyan];
    for(let r=0;r<6;r++)for(let c=0;c<10;c++)
      this.bricks.push({x:c*46+5,y:r*26+52,w:42,h:20,alive:true,color:cols[r],pts:(6-r)*10});
    const getX=e=>{const R=canvas.getBoundingClientRect();return(e.clientX-R.left)*(canvas.width/R.width);};
    const getXT=e=>{const R=canvas.getBoundingClientRect();return(e.touches[0].clientX-R.left)*(canvas.width/R.width);};
    this._mm=e=>{const mx=getX(e);this.paddle.x=Math.max(0,Math.min(canvas.width-this.paddle.w,mx-this.paddle.w/2));};
    this._tm=e=>{e.preventDefault();const mx=getXT(e);this.paddle.x=Math.max(0,Math.min(canvas.width-this.paddle.w,mx-this.paddle.w/2));};
    canvas.addEventListener('mousemove',this._mm);
    canvas.addEventListener('touchmove',this._tm,{passive:false});
  },
  cleanup(){canvas.removeEventListener('mousemove',this._mm);canvas.removeEventListener('touchmove',this._tm);},
  update(){
    if(!this.started)return;
    const b=this.ball,p=this.paddle;
    b.x+=b.vx;b.y+=b.vy;
    if(b.x-b.r<0){b.x=b.r;b.vx=Math.abs(b.vx);}
    if(b.x+b.r>canvas.width){b.x=canvas.width-b.r;b.vx=-Math.abs(b.vx);}
    if(b.y-b.r<42){b.y=42+b.r;b.vy=Math.abs(b.vy);}
    if(b.y+b.r>canvas.height){over=true;return;}
    if(b.y+b.r>=p.y&&b.y+b.r<=p.y+p.h+6&&b.x>=p.x&&b.x<=p.x+p.w){
      b.vy=-Math.abs(b.vy);b.vx=((b.x-(p.x+p.w/2))/(p.w/2))*5.5;
    }
    for(const br of this.bricks){
      if(!br.alive)continue;
      if(b.x+b.r>br.x&&b.x-b.r<br.x+br.w&&b.y+b.r>br.y&&b.y-b.r<br.y+br.h){
        br.alive=false;setScore(score+br.pts);
        const oT=b.y+b.r-br.y,oB=br.y+br.h-(b.y-b.r),oL=b.x+b.r-br.x,oR=br.x+br.w-(b.x-b.r);
        Math.min(oT,oB)<Math.min(oL,oR)?b.vy*=-1:b.vx*=-1;break;
      }
    }
    if(this.bricks.every(b=>!b.alive))over=true;
  },
  draw(){
    bx(0,0,canvas.width,canvas.height,BG);
    bx(0,0,canvas.width,42,SF);
    tx('BREAKOUT',8,28,C.pink,11);tx(''+score,380,28,C.gold,11);
    for(const br of this.bricks){
      if(!br.alive)continue;
      glo(br.color,5);bx(br.x,br.y,br.w,br.h,br.color);ngl();
      ctx.strokeStyle='rgba(0,0,0,.35)';ctx.lineWidth=1;ctx.strokeRect(br.x,br.y,br.w,br.h);
      bx(br.x+2,br.y+2,br.w-4,4,'rgba(255,255,255,.22)');
    }
    const p=this.paddle;
    const pg=ctx.createLinearGradient(p.x,p.y,p.x,p.y+p.h);
    pg.addColorStop(0,C.cyan);pg.addColorStop(1,'#005577');
    glo(C.cyan,14);ctx.fillStyle=pg;ctx.fillRect(p.x,p.y,p.w,p.h);ngl();
    const b=this.ball;
    glo(C.white,18);ctx.fillStyle=C.white;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();ngl();
    if(!this.started)splash('BREAKOUT',['DRAG FINGER ON CANVAS','TO MOVE PADDLE']);
    if(over){gameOverScreen(this.bricks.every(b=>!b.alive)?'YOU WIN!':'GAME OVER');}
  },
  onKey(k){
    if(k===' '){
      if(over){over=false;setScore(0);this.cleanup();this.init();}else this.started=true;
    }
    if(k==='ArrowLeft') this.paddle.x=Math.max(0,this.paddle.x-24);
    if(k==='ArrowRight')this.paddle.x=Math.min(canvas.width-this.paddle.w,this.paddle.x+24);
  }
};

/* ══════ TETRIS ══════ */
const tetris={
  title:'TETRIS',W:380,H:620,interval:520,
  CS:28,COLS:10,ROWS:20,OX:10,OY:40,
  board:[],piece:null,nxt:null,
  DEFS:[
    {shape:[[1,1,1,1]],       color:C.cyan},
    {shape:[[1,1],[1,1]],     color:C.gold},
    {shape:[[0,1,0],[1,1,1]], color:C.purple},
    {shape:[[1,0,0],[1,1,1]], color:C.orange},
    {shape:[[0,0,1],[1,1,1]], color:C.pink},
    {shape:[[0,1,1],[1,1,0]], color:C.green},
    {shape:[[1,1,0],[0,1,1]], color:C.red},
  ],
  init(){this.board=Array.from({length:this.ROWS},()=>Array(this.COLS).fill(0));this.piece=this._sp();this.nxt=this._sp();},
  _sp(){const d=this.DEFS[Math.floor(Math.random()*this.DEFS.length)];return{shape:d.shape.map(r=>[...r]),color:d.color,x:Math.floor(this.COLS/2)-Math.floor(d.shape[0].length/2),y:0};},
  _rot(s){return s[0].map((_,c)=>s.map(r=>r[c]).reverse());},
  _ok(sh,x,y){
    for(let r=0;r<sh.length;r++)for(let c=0;c<sh[0].length;c++){
      if(!sh[r][c])continue;
      if(x+c<0||x+c>=this.COLS||y+r>=this.ROWS)return false;
      if(y+r>=0&&this.board[y+r][x+c])return false;
    }
    return true;
  },
  _lock(){
    const p=this.piece;
    for(let r=0;r<p.shape.length;r++)for(let c=0;c<p.shape[0].length;c++){
      if(p.shape[r][c]){if(p.y+r<0){over=true;return;}this.board[p.y+r][p.x+c]=p.color;}
    }
    let ln=0;
    for(let r=this.ROWS-1;r>=0;r--){if(this.board[r].every(c=>c)){this.board.splice(r,1);this.board.unshift(Array(this.COLS).fill(0));ln++;r++;}}
    setScore(score+([0,100,300,500,800][ln]||0));
    this.piece=this.nxt;this.nxt=this._sp();
    if(!this._ok(this.piece.shape,this.piece.x,this.piece.y))over=true;
  },
  update(){const p=this.piece;if(this._ok(p.shape,p.x,p.y+1))p.y++;else this._lock();},
  _cell(x,y,s,color){
    glo(color,5);bx(x+1,y+1,s-2,s-2,color);ngl();
    bx(x+2,y+2,s-4,5,'rgba(255,255,255,.28)');
    bx(x+2,y+s-6,s-4,4,'rgba(0,0,0,.28)');
  },
  draw(){
    const{CS,COLS,ROWS,OX,OY}=this;
    bx(0,0,canvas.width,canvas.height,BG);bx(0,0,canvas.width,OY,SF);
    tx('TETRIS',8,27,C.cyan,12);
    bx(OX,OY,COLS*CS,ROWS*CS,'rgba(255,255,255,.02)');
    ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=.5;
    for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(OX,OY+r*CS);ctx.lineTo(OX+COLS*CS,OY+r*CS);ctx.stroke();}
    for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(OX+c*CS,OY);ctx.lineTo(OX+c*CS,OY+ROWS*CS);ctx.stroke();}
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(this.board[r][c])this._cell(OX+c*CS,OY+r*CS,CS,this.board[r][c]);
    const p=this.piece;
    let gy=p.y;while(this._ok(p.shape,p.x,gy+1))gy++;
    if(gy!==p.y)for(let r=0;r<p.shape.length;r++)for(let c=0;c<p.shape[0].length;c++){
      if(!p.shape[r][c])continue;
      ctx.strokeStyle=p.color+'55';ctx.lineWidth=1;ctx.strokeRect(OX+(p.x+c)*CS+1,OY+(gy+r)*CS+1,CS-2,CS-2);
    }
    for(let r=0;r<p.shape.length;r++)for(let c=0;c<p.shape[0].length;c++)
      if(p.shape[r][c])this._cell(OX+(p.x+c)*CS,OY+(p.y+r)*CS,CS,p.color);
    const px=OX+COLS*CS+10;
    tx(''+score,px,65,C.gold,9);tx('NEXT',px,88,C.white,7);
    const np=this.nxt;
    for(let r=0;r<np.shape.length;r++)for(let c=0;c<np.shape[0].length;c++)
      if(np.shape[r][c]){glo(np.color,4);bx(px+c*14,100+r*14,13,13,np.color);ngl();}
    if(over)gameOverScreen();
  },
  onKey(k){
    if(over&&(k===' '||k==='Enter')){over=false;setScore(0);this.init();return;}
    if(over)return;
    const p=this.piece;
    if(k==='ArrowLeft' &&this._ok(p.shape,p.x-1,p.y))p.x--;
    if(k==='ArrowRight'&&this._ok(p.shape,p.x+1,p.y))p.x++;
    if(k==='ArrowDown' &&this._ok(p.shape,p.x,p.y+1))p.y++;
    if(k==='ArrowUp'){const r=this._rot(p.shape);if(this._ok(r,p.x,p.y))p.shape=r;else if(this._ok(r,p.x-1,p.y)){p.shape=r;p.x--;}else if(this._ok(r,p.x+1,p.y)){p.shape=r;p.x++;}}
    if(k===' '){while(this._ok(p.shape,p.x,p.y+1))p.y++;this._lock();}
  }
};

/* ══════ SPACE INVADERS ══════ */
const invaders={
  title:'INVADERS',W:480,H:520,interval:16,
  player:null,bullets:[],ebullets:[],enemies:[],
  edir:1,eTimer:0,eIvl:55,eShoot:0,shields:[],level:1,lastFire:0,
  init(){
    this.player={x:220,y:468,w:40,h:20};
    this.bullets=[];this.ebullets=[];
    this.level=1;this.edir=1;this.eIvl=55;this.eTimer=0;this.eShoot=0;this.lastFire=0;
    this._enemies();this._shields();
  },
  _enemies(){
    this.enemies=[];
    const cols=[C.pink,C.pink,C.purple,C.purple,C.cyan,C.cyan];
    for(let r=0;r<5;r++)for(let c=0;c<10;c++)
      this.enemies.push({x:c*44+10,y:r*34+55,w:32,h:24,alive:true,color:cols[r]||C.cyan,row:r});
  },
  _shields(){
    this.shields=[];
    for(let s=0;s<4;s++){
      const sx=s*110+22,sy=400,blocks=[];
      for(let r=0;r<3;r++)for(let c=0;c<7;c++){
        if(r===0&&(c===0||c===6))continue;
        if(r===2&&c>=2&&c<=4)continue;
        blocks.push({x:sx+c*10,y:sy+r*10,alive:true});
      }
      this.shields.push({blocks});
    }
  },
  update(){
    if(keys['ArrowLeft']) this.player.x=Math.max(0,this.player.x-4);
    if(keys['ArrowRight'])this.player.x=Math.min(canvas.width-this.player.w,this.player.x+4);
    this.bullets =this.bullets .filter(b=>b.y>0);this.bullets .forEach(b=>b.y-=7);
    this.ebullets=this.ebullets.filter(b=>b.y<canvas.height);this.ebullets.forEach(b=>b.y+=3.5);
    const alive=this.enemies.filter(e=>e.alive);
    if(!alive.length){this.level++;this.eIvl=Math.max(14,55-this.level*5);this._enemies();this._shields();setScore(score+500);return;}
    this.eTimer++;
    if(this.eTimer>=this.eIvl){
      this.eTimer=0;
      const minX=Math.min(...alive.map(e=>e.x)),maxX=Math.max(...alive.map(e=>e.x+e.w));
      if((this.edir>0&&maxX>canvas.width-10)||(this.edir<0&&minX<10)){this.edir*=-1;this.enemies.forEach(e=>e.alive&&(e.y+=14));this.eIvl=Math.max(14,this.eIvl-2);}
      else this.enemies.forEach(e=>e.alive&&(e.x+=12*this.edir));
    }
    if(alive.some(e=>e.y+e.h>this.player.y)){over=true;return;}
    this.eShoot++;
    if(this.eShoot>=55){
      this.eShoot=0;
      const front=alive.filter(e=>!alive.some(o=>o!==e&&Math.abs(o.x-e.x)<5&&o.y>e.y));
      if(front.length){const sh=front[Math.floor(Math.random()*front.length)];this.ebullets.push({x:sh.x+sh.w/2,y:sh.y+sh.h});}
    }
    for(const b of this.bullets)for(const e of this.enemies){
      if(!e.alive)continue;
      if(b.x>=e.x&&b.x<=e.x+e.w&&b.y>=e.y&&b.y<=e.y+e.h){e.alive=false;b.y=-999;setScore(score+(4-e.row)*10+10);}
    }
    const pl=this.player;
    for(const b of this.ebullets)if(b.x>=pl.x&&b.x<=pl.x+pl.w&&b.y>=pl.y&&b.y<=pl.y+pl.h)over=true;
    for(const b of [...this.bullets,...this.ebullets])
      for(const sh of this.shields)for(const bl of sh.blocks){
        if(!bl.alive)continue;
        if(b.x>=bl.x&&b.x<=bl.x+10&&b.y>=bl.y&&b.y<=bl.y+10){bl.alive=false;b.y=-999;break;}
      }
  },
  draw(){
    bx(0,0,canvas.width,canvas.height,BG);bx(0,0,canvas.width,40,SF);
    tx('INVADERS',8,27,C.green,10);tx(''+score,310,27,C.gold,10);tx('LV'+this.level,430,27,C.cyan,10);
    for(const sh of this.shields)for(const bl of sh.blocks)if(bl.alive){glo(C.green,4);bx(bl.x,bl.y,9,9,C.green);ngl();}
    glo(C.green,5);ctx.strokeStyle=C.green;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,492);ctx.lineTo(canvas.width,492);ctx.stroke();ngl();
    const p=this.player;
    glo(C.cyan,12);ctx.fillStyle=C.cyan;
    ctx.fillRect(p.x+13,p.y,4,6);ctx.fillRect(p.x+5,p.y+6,p.w-10,p.h-6);
    ctx.fillRect(p.x,p.y+12,8,p.h-12);ctx.fillRect(p.x+p.w-8,p.y+12,8,p.h-12);ngl();
    const fr=Math.floor(Date.now()/500)%2;
    for(const e of this.enemies){if(!e.alive)continue;glo(e.color,6);ctx.fillStyle=e.color;this._drawE(e.x,e.y,e.w,e.h,e.row,fr);}ngl();
    glo(C.gold,10);for(const b of this.bullets){ctx.fillStyle=C.gold;ctx.fillRect(b.x-2,b.y-10,4,12);}ngl();
    for(const b of this.ebullets){glo(C.red,6);ctx.fillStyle=C.red;ctx.fillRect(b.x-2,b.y,4,10);}ngl();
    if(over)gameOverScreen();
  },
  _drawE(x,y,w,h,row,f){
    if(row<=1){
      ctx.fillRect(x+8,y+2,w-16,4);ctx.fillRect(x+4,y+6,w-8,8);ctx.fillRect(x,y+14,w,6);
      if(f){ctx.fillRect(x+2,y+20,6,4);ctx.fillRect(x+w-8,y+20,6,4);}
      else{ctx.fillRect(x+8,y+20,6,4);ctx.fillRect(x+w-14,y+20,6,4);}
    }else if(row<=3){
      ctx.fillRect(x+4,y+2,w-8,4);ctx.fillRect(x+2,y+6,w-4,8);ctx.fillRect(x+4,y+14,8,4);ctx.fillRect(x+w-12,y+14,8,4);
      if(f){ctx.fillRect(x,y+6,4,4);ctx.fillRect(x+w-4,y+6,4,4);}
      else{ctx.fillRect(x,y+10,4,4);ctx.fillRect(x+w-4,y+10,4,4);}
    }else{
      ctx.fillRect(x+6,y+2,w-12,4);ctx.fillRect(x+2,y+6,w-4,8);ctx.fillRect(x+6,y+14,w-12,6);
      if(f){ctx.fillRect(x,y+4,4,6);ctx.fillRect(x+w-4,y+4,4,6);}
      else{ctx.fillRect(x,y+8,4,6);ctx.fillRect(x+w-4,y+8,4,6);}
    }
  },
  onKey(k){
    if(over&&(k===' '||k==='Enter')){over=false;setScore(0);this.init();return;}
    if(k===' '){
      const now=Date.now();
      if(now-this.lastFire>380&&this.bullets.length<3){this.lastFire=now;this.bullets.push({x:this.player.x+this.player.w/2,y:this.player.y});}
    }
  }
};

/* ══════ PONG ══════ */
const pong={
  title:'PONG',W:480,H:520,interval:16,
  ball:{},player:{},ai:{},started:false,_mm:null,_tm:null,
  init(){
    this.ball={x:240,y:260,vx:4.5,vy:3,r:8};
    this.player={x:450,y:215,w:12,h:90,score:0};
    this.ai={x:18,y:215,w:12,h:90,score:0};
    this.started=false;
    const getY=e=>{const R=canvas.getBoundingClientRect();return(e.clientY-R.top)*(canvas.height/R.height);};
    const getYT=e=>{const R=canvas.getBoundingClientRect();return(e.touches[0].clientY-R.top)*(canvas.height/R.height);};
    this._mm=e=>{this.player.y=Math.max(42,Math.min(canvas.height-this.player.h,getY(e)-this.player.h/2));};
    this._tm=e=>{e.preventDefault();this.player.y=Math.max(42,Math.min(canvas.height-this.player.h,getYT(e)-this.player.h/2));};
    canvas.addEventListener('mousemove',this._mm);
    canvas.addEventListener('touchmove',this._tm,{passive:false});
  },
  cleanup(){canvas.removeEventListener('mousemove',this._mm);canvas.removeEventListener('touchmove',this._tm);},
  _reset(dir){this.ball={x:240,y:260,vx:4.5*dir,vy:(Math.random()>.5?1:-1)*(2.5+Math.random()*2),r:8};},
  update(){
    if(!this.started)return;
    const b=this.ball,pl=this.player,ai=this.ai;
    b.x+=b.vx;b.y+=b.vy;
    if(b.y-b.r<42){b.y=42+b.r;b.vy=Math.abs(b.vy);}
    if(b.y+b.r>canvas.height){b.y=canvas.height-b.r;b.vy=-Math.abs(b.vy);}
    if(b.x+b.r>=pl.x&&b.x-b.r<=pl.x+pl.w&&b.y>=pl.y&&b.y<=pl.y+pl.h){
      b.x=pl.x-b.r;b.vx=-Math.abs(b.vx)*1.04;b.vy+=(b.y-(pl.y+pl.h/2))*.1;b.vx=Math.max(-14,Math.min(-4,b.vx));
    }
    if(b.x-b.r<=ai.x+ai.w&&b.x+b.r>=ai.x&&b.y>=ai.y&&b.y<=ai.y+ai.h){
      b.x=ai.x+ai.w+b.r;b.vx=Math.abs(b.vx)*1.04;b.vy+=(b.y-(ai.y+ai.h/2))*.1;b.vx=Math.min(14,Math.max(4,b.vx));
    }
    const ac=ai.y+ai.h/2,asp=3.2+ai.score*.2;
    if(b.vx<0){if(ac<b.y-8)ai.y=Math.min(canvas.height-ai.h,ai.y+asp);if(ac>b.y+8)ai.y=Math.max(42,ai.y-asp);}
    else{if(ac<canvas.height/2-8)ai.y+=1.5;if(ac>canvas.height/2+8)ai.y-=1.5;ai.y=Math.max(42,Math.min(canvas.height-ai.h,ai.y));}
    if(b.x<0){pl.score++;setScore(pl.score*100);this._reset(1);}
    if(b.x>canvas.width){ai.score++;this._reset(-1);}
    if(pl.score>=7||ai.score>=7)over=true;
  },
  draw(){
    bx(0,0,canvas.width,canvas.height,BG);bx(0,0,canvas.width,42,SF);
    tx('PONG',8,27,C.cyan,12);
    tx(''+this.ai.score,    canvas.width/2-50,29,C.pink, 16,'center');
    tx(':',                 canvas.width/2,   29,C.white,14,'center');
    tx(''+this.player.score,canvas.width/2+50,29,C.green,16,'center');
    ctx.setLineDash([10,12]);ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(canvas.width/2,42);ctx.lineTo(canvas.width/2,canvas.height);ctx.stroke();ctx.setLineDash([]);
    tx('CPU',50,57,C.pink,8,'center');tx('YOU',430,57,C.green,8,'center');
    const dp=(p,c)=>{const g=ctx.createLinearGradient(p.x,p.y,p.x+p.w,p.y);g.addColorStop(0,c);g.addColorStop(1,c+'44');glo(c,16);ctx.fillStyle=g;ctx.fillRect(p.x,p.y,p.w,p.h);ngl();};
    dp(this.player,C.green);dp(this.ai,C.pink);
    const b=this.ball;glo(C.white,22);ctx.fillStyle=C.white;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();ngl();
    if(!this.started)splash('PONG',['DRAG FINGER UP & DOWN','ON SCREEN TO PLAY','','FIRST TO 7 WINS']);
    if(over)gameOverScreen(this.player.score>=7?'YOU WIN!':'CPU WINS');
  },
  onKey(k){
    if(k===' '){if(over){over=false;setScore(0);this.cleanup();this.init();}else this.started=true;}
    if(k==='ArrowUp')   this.player.y=Math.max(42,this.player.y-24);
    if(k==='ArrowDown') this.player.y=Math.min(canvas.height-this.player.h,this.player.y+24);
  }
};
